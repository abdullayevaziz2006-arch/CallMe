workflows:
  android-workflow:
    name: Build Android Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Build Android App
        script: |
          cd android_app
          rm -rf .gradle app/.gradle build app/build
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          echo "Starting Gradle Build..."
          ./gradlew clean assembleDebug --no-daemon --stacktrace --gradle-user-home .gradle_home > build.log 2>&1 || BUILD_FAILED=true
          if [ "$BUILD_FAILED" = true ]; then
            echo "--- Last 100 lines of Build Log ---"
            tail -n 100 build.log
            echo ""
            echo "========================================="
            echo "=== CRITICAL GRADLE BUILD ERRORS FOUND ==="
            echo "========================================="
            echo "--- Kotlin Compiler Errors ---"
            grep -in "e: " build.log || echo "No Kotlin compiler errors found."
            echo ""
            echo "--- What Went Wrong ---"
            grep -i -A 10 "What went wrong" build.log || echo "No 'What went wrong' section found."
            echo "========================================="
            exit 1
          else
            echo "Gradle Build Completed Successfully!"
          fi
    artifacts:
      - android_app/app/build/outputs/apk/debug/*.apk
